name: Rescrape Duel Master Booster

on:
  workflow_dispatch:
    inputs:
      boosters:
        description: 'Booster code(s) to rescrape, space-separated (e.g. "dm25ex4" or "dm25ex4 dm25ex5")'
        required: true
        type: string

jobs:
  rescrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Setup GCP Credentials
      run: |
        echo '${{ secrets.GCP_CREDENTIALS }}' > gcp-credentials.json
        echo "GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/gcp-credentials.json" >> $GITHUB_ENV

    - name: Rescrape booster(s)
      env:
        MONGO_DATABASE: ${{ secrets.MONGO_DATABASE }}
        MONGO_USER: ${{ secrets.MONGO_USER }}
        MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}
        MONGO_CLUSTER: ${{ secrets.MONGO_CLUSTER }}
        C_DUELMASTERS: ${{vars.C_DUELMASTERS}}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        python scrapers/duelmasters/scripts/rescrape_booster.py ${{ inputs.boosters }}
