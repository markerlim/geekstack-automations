name: Scrape Duel Master Wiki Cards

on:
  workflow_dispatch:
    inputs:
      set_url:
        description: 'Wiki set page URL (e.g. https://duelmasters.fandom.com/wiki/DM25-EX4_Some_Name)'
        required: false
        type: string
      set_code:
        description: 'Set code (e.g. DM25-EX4). Auto-derived from URL if omitted.'
        required: false
        type: string
  schedule:
    - cron: '0 10 * * 0'  # Runs weekly at 6:00PM SGT on Sundays

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Setup GCP Credentials
      run: |
        echo '${{ secrets.GCP_CREDENTIALS }}' > gcp-credentials.json
        echo "GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/gcp-credentials.json" >> $GITHUB_ENV

    - name: Scrape wiki cards
      env:
        MONGO_DATABASE: ${{ secrets.MONGO_DATABASE }}
        MONGO_USER: ${{ secrets.MONGO_USER }}
        MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}
        MONGO_CLUSTER: ${{ secrets.MONGO_CLUSTER }}
        C_DUELMASTERS: ${{vars.C_DUELMASTERS}}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        ARGS=""
        if [ -n "${{ inputs.set_url }}" ]; then
          ARGS="$ARGS --set-url '${{ inputs.set_url }}'"
        fi
        if [ -n "${{ inputs.set_code }}" ]; then
          ARGS="$ARGS --set-code '${{ inputs.set_code }}'"
        fi
        python scrapers/duelmasters/pipelines/c_scrape_wiki_cards.py $ARGS
